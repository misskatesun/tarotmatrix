                const btn = document.createElement('button');
                btn.id = `btn-num-${i}`;
                btn.innerText = `${i} 號牌`;
                btn.onclick = () => selectItem(String(i));
                btn.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 border border-mystic-700 hover:border-mystic-gold/50";
                numContainer.appendChild(btn);
            }

            // Court Buttons
            const courtContainer = document.getElementById('selector-court');
            courtContainer.innerHTML = '';
            const courtKeys = ['page', 'knight', 'queen', 'king'];
            const courtLabels = { page: '侍從 (Page)', knight: '騎士 (Knight)', queen: '王后 (Queen)', king: '國王 (King)' };
            
            courtKeys.forEach(key => {
                const btn = document.createElement('button');
                btn.id = `btn-court-${key}`;
                btn.innerText = courtLabels[key];
                btn.onclick = () => selectItem(key);
                btn.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 border border-mystic-700 hover:border-mystic-gold/50";
                courtContainer.appendChild(btn);
            });

            updateSelectorActives();
        }

        // Handle item selection
        function selectItem(val) {
            state.selectedValue = val;
            updateSelectorActives();
            renderSelectedData();
        }

        // Update active class styles for selectors
        function updateSelectorActives() {
            // Clear all number button active styles
            for (let i = 1; i <= 10; i++) {
                const btn = document.getElementById(`btn-num-${i}`);
                if (btn) {
                    if (state.category === 'numbers' && state.selectedValue === String(i)) {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all duration-200 border border-mystic-gold bg-mystic-gold text-mystic-900 shadow-lg shadow-mystic-gold/10";
                    } else {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 border border-mystic-700 bg-mystic-900/50 text-gray-300 hover:border-mystic-gold/50 hover:bg-mystic-800";
                    }
                }
            }

            // Clear all court button active styles
            const courtKeys = ['page', 'knight', 'queen', 'king'];
            courtKeys.forEach(key => {
                const btn = document.getElementById(`btn-court-${key}`);
                if (btn) {
                    if (state.category === 'court' && state.selectedValue === key) {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all duration-200 border border-mystic-gold bg-mystic-gold text-mystic-900 shadow-lg shadow-mystic-gold/10";
                    } else {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 border border-mystic-700 bg-mystic-900/50 text-gray-300 hover:border-mystic-gold/50 hover:bg-mystic-800";
                    }
                }
            });
        }

        // Render card views with updated content
        function renderSelectedData() {
            const currentItem = tarotData[state.category][state.selectedValue];
            
            // Set Banner info
            document.getElementById('current-badge').innerText = currentItem.title;
            document.getElementById('current-desc').innerText = currentItem.desc;

            // Render Wands
            populateCardHTML('card-wands', 'wands', currentItem.wands, 'mystic-wands', '🔥', 'border-mystic-wands/20');
            // Render Cups
            populateCardHTML('card-cups', 'cups', currentItem.cups, 'mystic-cups', '💧', 'border-mystic-cups/20');
            // Render Swords
            populateCardHTML('card-swords', 'swords', currentItem.swords, 'mystic-swords', '💨', 'border-mystic-swords/20');
            // Render Pentacles
            populateCardHTML('card-pentacles', 'pentacles', currentItem.pentacles, 'mystic-pentacles', '🌱', 'border-mystic-pentacles/20');
        }

        // Helper to populate individual card blocks
        function populateCardHTML(elementId, type, cardData, colorClass, icon, borderClass) {
            const cardElement = document.getElementById(elementId);
            const titleColor = {
                wands: 'text-mystic-wands',
                cups: 'text-mystic-cups',
                swords: 'text-mystic-swords',
                pentacles: 'text-mystic-pentacles'
            }[type];

            cardElement.innerHTML = `
                <!-- Card Head -->
                <div class="p-5 border-b border-mystic-700/60 bg-mystic-900/40 relative">
                    <div class="absolute top-4 right-4 text-2xl opacity-40">${icon}</div>
                    <span class="text-xs uppercase tracking-wider text-gray-500 font-mystical">MINOR ARCANA</span>
                    <h3 class="text-2xl font-bold font-mystical ${titleColor} mt-1">${cardData.name}</h3>
                </div>
                
                <!-- Core Meaning -->
                <div class="px-5 py-4 border-b border-mystic-700/40 bg-mystic-700/10">
                    <span class="text-xs text-mystic-gold font-semibold uppercase tracking-wider block mb-1">
                        <i class="fa-solid fa-compass mr-1"></i> 核心意涵
                    </span>
                    <p class="text-sm font-medium text-gray-200 leading-relaxed">${cardData.core}</p>
                </div>
                
                <!-- Upright and Reversed details -->
                <div class="p-5 flex-grow space-y-4">
                    <!-- Upright -->
                    <div class="bg-mystic-900/30 p-3.5 rounded-xl border border-mystic-gold/10 hover:border-mystic-gold/20 transition">
                        <span class="inline-flex items-center text-xs font-semibold px-2 py-0.5 rounded bg-mystic-gold/10 text-mystic-goldLight mb-2 border border-mystic-gold/20">
                            <i class="fa-solid fa-arrow-up-long mr-1"></i> 正位 (Upright)
                        </span>
                        <p class="text-xs sm:text-sm text-gray-300 leading-relaxed">${cardData.upright}</p>
                    </div>
                    
                    <!-- Reversed -->
                    <div class="bg-mystic-900/30 p-3.5 rounded-xl border border-red-500/10 hover:border-red-500/20 transition">
                        <span class="inline-flex items-center text-xs font-semibold px-2 py-0.5 rounded bg-red-950/30 text-red-400 mb-2 border border-red-900/40">
                            <i class="fa-solid fa-arrow-down-long mr-1"></i> 逆位 (Reversed)
                        </span>
                        <p class="text-xs sm:text-sm text-gray-300 leading-relaxed">${cardData.reversed}</p>
                    </div>
                </div>
                
                <!-- Card Footer (Decorative) -->
                <div class="px-5 py-3 border-t border-mystic-700/40 bg-mystic-900/20 text-center">
                    <span class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-mystical">Tarot Matrix Energy</span>
                </div>
            `;
        }

        // Set View mode: Cards or Table
        function setViewMode(mode) {
            state.viewMode = mode;
            
            const btnCards = document.getElementById('btn-view-cards');
            const btnTable = document.getElementById('btn-view-table');
            const viewCards = document.getElementById('view-cards');
            const viewTable = document.getElementById('view-table');
            
            if (mode === 'cards') {
                btnCards.className = "px-4 py-1.5 rounded text-xs sm:text-sm transition bg-mystic-gold text-mystic-900 font-semibold shadow";
                btnTable.className = "px-4 py-1.5 rounded text-xs sm:text-sm transition text-gray-400 hover:text-gray-200";
                viewCards.classList.remove('hidden');
                viewTable.classList.add('hidden');
            } else {
                btnTable.className = "px-4 py-1.5 rounded text-xs sm:text-sm transition bg-mystic-gold text-mystic-900 font-semibold shadow";
                btnCards.className = "px-4 py-1.5 rounded text-xs sm:text-sm transition text-gray-400 hover:text-gray-200";
                viewTable.classList.remove('hidden');
                viewCards.classList.add('hidden');
            }
        }

        // Populate and construct the full comparison table view
        function buildFullMatrixTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // Section 1: Numbers (1-10)
            const sectionHeaderNum = document.createElement('tr');
            sectionHeaderNum.className = "bg-mystic-900/60";
            sectionHeaderNum.innerHTML = `
                <td colspan="5" class="p-3 text-center text-xs tracking-[0.3em] font-mystical text-mystic-gold font-bold border-y border-mystic-gold/20">
                    第一階段：數字牌 (ACE - 10 號) 能量演變
                </td>
            `;
            tbody.appendChild(sectionHeaderNum);

            Object.keys(tarotData.numbers).forEach(numKey => {
                const item = tarotData.numbers[numKey];
                const tr = document.createElement('tr');
                tr.className = "border-b border-mystic-700/40 hover:bg-mystic-700/10 transition";
                tr.innerHTML = `
                    <td class="p-4 align-top">
                        <div class="font-mystical font-bold text-mystic-gold">${item.title}</div>
                        <div class="text-[11px] text-gray-400 mt-1 font-light leading-snug">${item.desc}</div>
                    </td>
                    <!-- Wands -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-wands text-sm">${item.wands.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.wands.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.wands.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.wands.reversed}
                        </div>
                    </td>
                    <!-- Cups -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-cups text-sm">${item.cups.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.cups.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.cups.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.cups.reversed}
                        </div>
                    </td>
                    <!-- Swords -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-swords text-sm">${item.swords.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.swords.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.swords.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.swords.reversed}
                        </div>
                    </td>
                    <!-- Pentacles -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-pentacles text-sm">${item.pentacles.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.pentacles.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.pentacles.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.pentacles.reversed}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Section 2: Court Cards
            const sectionHeaderCourt = document.createElement('tr');
            sectionHeaderCourt.className = "bg-mystic-900/60";
            sectionHeaderCourt.innerHTML = `
                <td colspan="5" class="p-3 text-center text-xs tracking-[0.3em] font-mystical text-mystic-gold font-bold border-y border-mystic-gold/20">
                    第二階段：宮廷人物牌 (PAGE - KING) 人際心智
                </td>
            `;
            tbody.appendChild(sectionHeaderCourt);

            Object.keys(tarotData.court).forEach(courtKey => {
                const item = tarotData.court[courtKey];
                const tr = document.createElement('tr');
                tr.className = "border-b border-mystic-700/40 hover:bg-mystic-700/10 transition";
                tr.innerHTML = `
                    <td class="p-4 align-top">
                        <div class="font-mystical font-bold text-mystic-gold">${item.title}</div>
                        <div class="text-[11px] text-gray-400 mt-1 font-light leading-snug">${item.desc}</div>
                    </td>
                    <!-- Wands -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-wands text-sm">${item.wands.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.wands.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.wands.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.wands.reversed}
                        </div>
                    </td>
                    <!-- Cups -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-cups text-sm">${item.cups.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.cups.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.cups.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.cups.reversed}
                        </div>
                    </td>
                    <!-- Swords -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-swords text-sm">${item.swords.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.swords.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.swords.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.swords.reversed}
                        </div>
                    </td>
                    <!-- Pentacles -->
                    <td class="p-4 border-l border-mystic-700/30 align-top">
                        <div class="font-bold text-mystic-pentacles text-sm">${item.pentacles.name}</div>
                        <div class="text-[11px] text-mystic-goldLight mt-1 font-medium bg-mystic-gold/5 py-1 px-1.5 rounded">${item.pentacles.core}</div>
                        <div class="text-xs text-gray-300 mt-2">
                            <strong class="text-mystic-gold">正：</strong>${item.pentacles.upright}<br>
                            <strong class="text-red-400">逆：</strong>${item.pentacles.reversed}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
